<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Le Jardin d'Akid Lotfi</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:#FAF7F2; --card:#FFFFFF; --ink:#1F1B16; --ink-soft:#6b6459;
    --saffron:#E8A33D; --basil:#4C8C4A; --brick:#C1483D; --line:#E7E0D4;
    --shadow:0 4px 20px rgba(0,0,0,0.06);
    --radius:16px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { 
    margin:0; background:var(--paper); color:var(--ink); 
    font-family:'Inter','Cairo',sans-serif; padding-bottom:90px;
    -webkit-tap-highlight-color:transparent;
  }
  body.rtl { direction:rtl; text-align:right; }
  
  /* Top Bar */
  .top-bar { 
    position:sticky; top:0; z-index:50; 
    background:rgba(250,247,242,0.95); backdrop-filter:blur(12px);
    padding:8px 16px; display:flex; justify-content:space-between; 
    align-items:center; border-bottom:1px solid var(--line);
  }
  .lang-group { display:flex; gap:4px; }
  .lang-btn { 
    background:transparent; border:1px solid var(--line); 
    padding:4px 10px; border-radius:8px; cursor:pointer; 
    font-size:12px; font-weight:600; transition:0.2s;
  }
  .lang-btn.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .cart-btn { 
    background:var(--ink); color:var(--paper); border:none; 
    padding:6px 14px; border-radius:10px; font-weight:700; 
    font-size:13px; cursor:pointer; display:flex; align-items:center; gap:6px;
  }
  .cart-badge { background:var(--saffron); color:var(--ink); border-radius:50%; padding:0 6px; font-size:11px; min-width:18px; text-align:center; }

  /* Header */
  .hero { 
    width:100%; height:180px; background-size:cover; background-position:center; 
    position:relative; display:flex; align-items:flex-end;
  }
  .hero::before { 
    content:''; position:absolute; inset:0; 
    background:linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.6) 100%);
  }
  .hero-content { 
    position:relative; padding:16px 20px; color:#fff; width:100%;
    display:flex; justify-content:space-between; align-items:flex-end;
  }
  .hero-content h1 { font-family:'Fraunces',serif; font-size:22px; margin:0; text-shadow:0 2px 8px rgba(0,0,0,0.3); }
  .hero-content .table-tag { 
    font-family:'IBM Plex Mono',monospace; font-size:12px; 
    background:rgba(0,0,0,0.5); padding:4px 12px; border-radius:20px;
  }

  /* Categories */
  .cats-scroll { 
    display:flex; gap:6px; overflow-x:auto; padding:10px 16px;
    background:var(--paper); position:sticky; top:48px; z-index:30;
    scrollbar-width:none; -webkit-overflow-scrolling:touch;
  }
  .cats-scroll::-webkit-scrollbar { display:none; }
  .cat-chip { 
    flex:none; padding:6px 16px; border-radius:20px; 
    background:var(--card); border:1px solid var(--line); 
    font-weight:600; font-size:12px; cursor:pointer; 
    white-space:nowrap; transition:0.2s;
  }
  .cat-chip.active { background:var(--saffron); color:var(--ink); border-color:var(--saffron); }
  .cat-chip:active { transform:scale(0.95); }

  /* Menu */
  main { padding:0 16px; max-width:600px; margin:0 auto; }
  .section-title { font-family:'Fraunces',serif; font-size:20px; margin:20px 0 12px; display:flex; align-items:center; gap:8px; }
  .section-title span { font-size:14px; color:var(--ink-soft); font-weight:400; }

  .dish-card { 
    display:flex; gap:12px; background:var(--card); 
    border:1px solid var(--line); border-radius:var(--radius); 
    padding:12px; margin-bottom:10px; align-items:center;
    transition:0.2s; cursor:pointer;
  }
  .dish-card:active { transform:scale(0.98); }
  .dish-img { 
    width:70px; height:70px; border-radius:12px; object-fit:cover; 
    background:#eee; flex-shrink:0; border:1px solid var(--line);
  }
  .dish-details { flex:1; min-width:0; }
  .dish-details h4 { font-family:'Fraunces',serif; margin:0 0 2px; font-size:15px; }
  .dish-details p { font-size:12px; color:var(--ink-soft); margin:0 0 4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .dish-price { font-family:'IBM Plex Mono',monospace; font-weight:700; color:var(--brick); font-size:14px; }
  
  .qty-ctrl { display:flex; align-items:center; gap:6px; background:var(--paper); padding:2px 6px; border-radius:20px; }
  .qty-ctrl button { 
    background:var(--ink); color:var(--paper); border:none; 
    width:26px; height:26px; border-radius:50%; cursor:pointer; 
    font-size:14px; font-weight:700; transition:0.2s;
  }
  .qty-ctrl button:active { transform:scale(0.85); }
  .qty-ctrl .qty-num { font-weight:700; min-width:20px; text-align:center; }

  .add-btn { 
    background:var(--basil); color:#fff; border:none; 
    width:34px; height:34px; border-radius:50%; font-size:18px; 
    cursor:pointer; transition:0.2s; flex-shrink:0;
  }
  .add-btn:active { transform:scale(0.85); }

  /* Footer */
  .footer { 
    background:var(--ink); color:var(--paper); padding:24px 16px; 
    text-align:center; margin-top:32px; border-radius:20px 20px 0 0;
  }
  .footer-logo { width:50px; height:50px; border-radius:50%; object-fit:cover; margin-bottom:6px; }
  .footer-name { font-family:'Fraunces',serif; font-size:18px; display:block; }
  .footer-phone { font-size:13px; color:#88909B; margin-top:4px; }

  /* Cart Overlay */
  .overlay { 
    position:fixed; inset:0; background:rgba(0,0,0,0.4); 
    z-index:90; display:none; 
    -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
  }
  .overlay.open { display:block; }
  
  .cart-sheet { 
    position:fixed; bottom:0; left:0; right:0; 
    background:var(--paper); border-radius:20px 20px 0 0; 
    z-index:95; padding:20px 20px 30px; 
    transform:translateY(100%); transition:0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height:80vh; overflow-y:auto;
  }
  .cart-sheet.open { transform:translateY(0); }
  .cart-sheet .handle { width:40px; height:4px; background:var(--line); border-radius:4px; margin:0 auto 16px; }
  .cart-item { 
    display:flex; justify-content:space-between; padding:10px 0; 
    border-bottom:1px solid var(--line); align-items:center;
  }
  .cart-item .item-name { font-size:14px; }
  .cart-item .item-price { font-family:'IBM Plex Mono',monospace; font-weight:600; }
  .cart-total { 
    display:flex; justify-content:space-between; 
    padding:16px 0; font-size:18px; font-weight:700; 
    border-top:2px solid var(--ink);
  }
  .cart-send { 
    background:var(--basil); color:#fff; border:none; 
    width:100%; padding:14px; border-radius:12px; 
    font-size:16px; font-weight:700; cursor:pointer;
    transition:0.2s;
  }
  .cart-send:active { transform:scale(0.98); }
  .cart-send:disabled { background:#88909B; cursor:not-allowed; }

  /* Toast */
  .toast {
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); padding:12px 24px;
    border-radius:12px; font-size:14px; font-weight:600;
    box-shadow:0 8px 32px rgba(0,0,0,0.3); z-index:100;
    opacity:0; transition:0.3s ease;
    pointer-events:none;
  }
  .toast.show { opacity:1; bottom:110px; }
  .toast.success { background:var(--basil); }
  .toast.error { background:var(--brick); }

  /* Empty state */
  .empty-state { text-align:center; padding:40px 20px; color:var(--ink-soft); }
  .empty-state .icon { font-size:48px; margin-bottom:12px; }

  @media (max-width:480px) {
    .hero { height:140px; }
    .hero-content h1 { font-size:18px; }
    .dish-img { width:60px; height:60px; }
    .dish-details h4 { font-size:14px; }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="lang-group">
    <button class="lang-btn active" data-lang="fr" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="ar" onclick="setLang('ar')">ع</button>
  </div>
  <button class="cart-btn" onclick="openCart()">
    🛒 <span class="cart-badge" id="countBad">0</span>
  </button>
</div>

<!-- Hero -->
<div class="hero" id="hBanner">
  <div class="hero-content">
    <h1 id="hTitle">Le Jardin d'Akid Lotfi</h1>
    <span class="table-tag" id="tabBadge">📍 Table</span>
  </div>
</div>

<!-- Categories -->
<div class="cats-scroll" id="cBar"></div>

<!-- Menu -->
<main id="menuContainer">
  <div class="empty-state">
    <div class="icon">🍽️</div>
    <p>Chargement du menu...</p>
  </div>
</main>

<!-- Footer -->
<div class="footer">
  <img class="footer-logo" id="fLogo" src="" alt="">
  <span class="footer-name" id="fName">Le Jardin d'Akid Lotfi</span>
  <span class="footer-phone" id="fPhone">📞 +213 5XX XX XX XX</span>
  <p style="font-size:10px; color:#6b6459; margin-top:8px;">✨ Commandez depuis votre table ✨</p>
</div>

<!-- Cart -->
<div class="overlay" id="layer" onclick="closeCart()"></div>
<div class="cart-sheet" id="cSheet">
  <div class="handle"></div>
  <h3 id="cartTitle" style="margin-top:0;">Votre Panier</h3>
  <div id="cLines"></div>
  <div class="cart-total">
    <span id="cartTotalLabel">Total</span>
    <span id="cTotal">0 DA</span>
  </div>
  <button class="cart-send" id="cartSend" onclick="sendOrder()">🚀 Envoyer la commande</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
  // ============================================================
  // SMARTQR CLIENT - Version Améliorée
  // ============================================================

  // ---- ÉTAT ----
  let menu = [];
  let cart = [];
  let lang = 'fr';
  let config = {};
  const tableId = new URLSearchParams(location.search).get('table') || 'T1';

  // ---- DICTIONNAIRE ----
  const dict = {
    fr: { 
      title: 'Votre Panier', total: 'Total', send: '🚀 Envoyer la commande',
      empty: 'Panier vide', added: 'Ajouté au panier', sent: 'Commande envoyée !'
    },
    en: { 
      title: 'Your Cart', total: 'Total', send: '🚀 Send Order',
      empty: 'Cart is empty', added: 'Added to cart', sent: 'Order sent!'
    },
    ar: { 
      title: 'سلتك', total: 'المجموع', send: '🚀 أرسل الطلب',
      empty: 'السلة فارغة', added: 'أضيف إلى السلة', sent: 'تم إرسال الطلب!'
    }
  };

  // ---- INIT ----
  document.getElementById('tabBadge').textContent = '📍 ' + tableId;

  async function init() {
    try {
      // Load config
      config = await SmartQRApi.cache.getConfig();
      if (config.HeaderImage) document.getElementById('hBanner').style.backgroundImage = `url('${config.HeaderImage}')`;
      if (config.FooterImage) document.getElementById('fLogo').src = config.FooterImage;
      if (config.ContactPhone) document.getElementById('fPhone').textContent = '📞 ' + config.ContactPhone;

      // Load menu
      menu = await SmartQRApi.cache.getMenu();
      
      // Set default language
      setLang('fr');
    } catch (err) {
      console.error('Init error:', err);
      showToast('⚠️ Erreur de chargement', 'error');
      document.getElementById('menuContainer').innerHTML = `
        <div class="empty-state">
          <div class="icon">⚠️</div>
          <p>Impossible de charger le menu.<br>Vérifiez votre connexion.</p>
          <button onclick="init()" style="margin-top:12px;padding:8px 24px;border-radius:8px;border:1px solid var(--line);background:var(--card);cursor:pointer;">🔄 Réessayer</button>
        </div>
      `;
    }
  }

  // ---- LANGUE ----
  function setLang(l) {
    lang = l;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.lang-btn[data-lang="${l}"]`)?.classList.add('active');
    document.body.className = l === 'ar' ? 'rtl' : '';

    // Header
    const welcome = config['WelcomeMsg_' + l] || config.NomRestaurant || '';
    document.getElementById('hTitle').textContent = parseLoc(welcome);
    document.getElementById('fName').textContent = parseLoc(config.NomRestaurant || '');

    // Cart
    document.getElementById('cartTitle').textContent = dict[l].title;
    document.getElementById('cartTotalLabel').textContent = dict[l].total;
    document.getElementById('cartSend').textContent = dict[l].send;

    renderMenu();
  }

  function parseLoc(str) {
    if (!str) return '';
    const parts = str.split('|').map(s => s.trim());
    if (parts.length === 3) {
      return lang === 'fr' ? parts[0] : (lang === 'en' ? parts[1] : parts[2]);
    }
    return parts[0] || str;
  }

  // ---- RENDER MENU ----
  function renderMenu() {
    // Categories
    const cBar = document.getElementById('cBar');
    cBar.innerHTML = menu.map((c, i) => `
      <div class="cat-chip ${i === 0 ? 'active' : ''}" 
           onclick="document.getElementById('cat-${c.id}')?.scrollIntoView({behavior:'smooth', block:'start'})">
        ${parseLoc(c.nom)}
      </div>
    `).join('');

    // Dishes
    const container = document.getElementById('menuContainer');
    if (!menu || menu.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📋</div>
          <p>Aucun plat disponible</p>
        </div>
      `;
      return;
    }

    container.innerHTML = menu.map(c => `
      <div id="cat-${c.id}">
        <div class="section-title">✨ ${parseLoc(c.nom)}</div>
      </div>
      ${c.produits.map(p => `
        <div class="dish-card" id="dish-${p.id}">
          <img class="dish-img" src="${p.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=150'}" 
               loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=150'">
          <div class="dish-details">
            <h4>${parseLoc(p.nom)}</h4>
            <p>${parseLoc(p.description)}</p>
            <div class="dish-price">${p.prix} DA</div>
          </div>
          <div id="box-${p.id}">${renderQty(p)}</div>
        </div>
      `).join('')}
    `).join('');
  }

  function renderQty(p) {
    const item = cart.find(c => c.id === p.id);
    if (!item) {
      return `<button class="add-btn" onclick="addItem('${p.id}')">+</button>`;
    }
    return `
      <div class="qty-ctrl">
        <button onclick="updateQty('${p.id}', -1)">−</button>
        <span class="qty-num">${item.qte}</span>
        <button onclick="updateQty('${p.id}', 1)">+</button>
      </div>
    `;
  }

  // ---- CART OPERATIONS ----
  function findProduct(id) {
    for (const c of menu) {
      const p = c.produits.find(x => x.id === id);
      if (p) return p;
    }
    return null;
  }

  function addItem(id) {
    const p = findProduct(id);
    if (!p) return;
    
    const existing = cart.find(c => c.id === id);
    if (existing) {
      existing.qte += 1;
    } else {
      cart.push({ id: p.id, nom: p.nom, prix: p.prix, qte: 1 });
    }
    syncCart();
    showToast('✅ ' + dict[lang].added, 'success');
  }

  function updateQty(id, delta) {
    const item = cart.find(c => c.id === id);
    if (!item) return;
    item.qte += delta;
    if (item.qte <= 0) {
      cart = cart.filter(c => c.id !== id);
    }
    syncCart();
  }

  function syncCart() {
    // Update badge
    document.getElementById('countBad').textContent = cart.reduce((s, i) => s + i.qte, 0);
    
    // Update dish cards
    menu.forEach(c => c.produits.forEach(p => {
      const el = document.getElementById('box-' + p.id);
      if (el) el.innerHTML = renderQty(p);
    }));
    
    // Update cart sheet if open
    if (document.getElementById('cSheet').classList.contains('open')) {
      updateCartSheet();
    }
  }

  function updateCartSheet() {
    const lines = document.getElementById('cLines');
    if (cart.length === 0) {
      lines.innerHTML = `<div style="text-align:center;padding:20px;color:var(--ink-soft);">${dict[lang].empty}</div>`;
      document.getElementById('cTotal').textContent = '0 DA';
      document.getElementById('cartSend').disabled = true;
      return;
    }

    lines.innerHTML = cart.map(i => `
      <div class="cart-item">
        <span class="item-name">${i.qte}× ${parseLoc(i.nom)}</span>
        <span class="item-price">${i.qte * i.prix} DA</span>
      </div>
    `).join('');
    
    document.getElementById('cTotal').textContent = cart.reduce((s, i) => s + i.qte * i.prix, 0) + ' DA';
    document.getElementById('cartSend').disabled = false;
  }

  // ---- CART UI ----
  function openCart() {
    if (cart.length === 0) {
      showToast('🛒 ' + dict[lang].empty, 'error');
      return;
    }
    updateCartSheet();
    document.getElementById('layer').classList.add('open');
    document.getElementById('cSheet').classList.add('open');
  }

  function closeCart() {
    document.getElementById('layer').classList.remove('open');
    document.getElementById('cSheet').classList.remove('open');
  }

  // ---- SEND ORDER ----
  async function sendOrder() {
    if (cart.length === 0) {
      showToast('🛒 ' + dict[lang].empty, 'error');
      return;
    }

    const btn = document.getElementById('cartSend');
    btn.disabled = true;
    btn.textContent = '⏳ Envoi...';

    try {
      const res = await SmartQRApi.post('createOrder', {
        tableId: tableId,
        items: cart.map(i => ({
          id: i.id,
          nom: i.nom,
          prix: i.prix,
          qte: i.qte
        })),
        notes: 'Langue: ' + lang
      });

      if (res.ok) {
        showToast('✅ ' + dict[lang].sent, 'success');
        cart = [];
        syncCart();
        closeCart();
      } else {
        showToast('❌ ' + (res.error || 'Erreur'), 'error');
      }
    } catch (err) {
      showToast('❌ ' + err.message, 'error');
    }

    btn.disabled = false;
    btn.textContent = dict[lang].send;
  }

  // ---- TOAST ----
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type ? ' ' + type : '');
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ---- START ----
  init();

  // Auto-refresh menu toutes les 5 minutes
  setInterval(() => {
    SmartQRApi.cache.clear();
    init();
  }, 300000);

  // Fermer le panier avec Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeCart();
  });
</script>
</body>
</html>
