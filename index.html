<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>SmartQR • Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           THEME SYSTEM
           ============================================================ */
        :root {
            --primary: #E8A33D;
            --primary-dark: #C98A2E;
            --primary-light: #F5D99B;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
            
            --bg: #0A0A0F;
            --bg-card: #14141C;
            --bg-input: #1A1A24;
            --bg-hover: rgba(232,163,61,0.06);
            
            --text: #F0F0F5;
            --text-secondary: #8A8AA0;
            --text-muted: #5A5A70;
            --text-inverse: #1A1A1A;
            
            --border: #2A2A3A;
            --border-light: #3A3A4A;
            
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            
            --shadow: 0 8px 40px rgba(0,0,0,0.4);
            --shadow-light: 0 4px 20px rgba(0,0,0,0.15);
            
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #F5F3F0;
            --bg-card: #FFFFFF;
            --bg-input: #F0EDEA;
            --bg-hover: rgba(232,163,61,0.08);
            
            --text: #1A1A1A;
            --text-secondary: #6B6459;
            --text-muted: #A09888;
            
            --border: #E5E0D8;
            --border-light: #D5D0C8;
            
            --shadow: 0 8px 40px rgba(0,0,0,0.08);
            --shadow-light: 0 4px 20px rgba(0,0,0,0.04);
        }

        /* ============================================================
           RESET & BASE
           ============================================================ */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
            transition: background var(--transition-slow), color var(--transition-slow);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body.rtl {
            direction: rtl;
            text-align: right;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ============================================================
           TOP BAR - Glassmorphism Premium
           ============================================================ */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(var(--bg-rgb, 10,10,15), 0.88);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            transition: background var(--transition-slow);
        }

        .topbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .topbar-brand .highlight { color: var(--primary); }
        .topbar-brand .light { font-weight: 300; color: var(--text-secondary); }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-icon {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 7px 12px;
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'Inter', sans-serif;
        }
        .btn-icon:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }
        .btn-icon.active {
            background: var(--primary);
            color: var(--text-inverse);
            border-color: var(--primary);
        }
        .btn-icon .lang-text { font-size: 11px; font-weight: 700; }

        .btn-cart {
            background: var(--primary);
            color: var(--text-inverse);
            border: none;
            border-radius: var(--radius-sm);
            padding: 7px 16px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }
        .btn-cart:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 16px rgba(232,163,61,0.3);
        }
        .btn-cart:active { transform: scale(0.95); }
        .btn-cart .badge {
            background: rgba(0,0,0,0.15);
            border-radius: 50%;
            padding: 0 8px;
            font-size: 11px;
            min-width: 20px;
            text-align: center;
        }

        /* ============================================================
           HERO - Premium Gradient
           ============================================================ */
        .hero {
            padding: 28px 24px 20px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--primary-light));
            margin: 12px 16px 0;
            border-radius: var(--radius);
            color: var(--text-inverse);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(232,163,61,0.2);
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -30%;
            width: 70%;
            height: 200%;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            transform: rotate(-20deg);
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -20%;
            width: 50%;
            height: 150%;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
            transform: rotate(15deg);
        }
        .hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 800;
            line-height: 1.2;
            text-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .hero .subtitle {
            font-size: 13px;
            opacity: 0.85;
            margin-top: 2px;
            font-weight: 500;
        }
        .hero .table-tag {
            background: rgba(0,0,0,0.12);
            padding: 6px 16px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ============================================================
           CATEGORIES SCROLL
           ============================================================ */
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 14px 16px 8px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .categories::-webkit-scrollbar { display: none; }

        .cat-chip {
            flex: none;
            padding: 7px 20px;
            border-radius: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
        }
        .cat-chip:hover {
            border-color: var(--primary);
            color: var(--text);
            transform: translateY(-1px);
        }
        .cat-chip.active {
            background: var(--primary);
            color: var(--text-inverse);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(232,163,61,0.25);
        }

        /* ============================================================
           MENU GRID
           ============================================================ */
        .menu-container {
            padding: 0 16px;
            max-width: 640px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            margin: 20px 0 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }
        .section-title .count {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
        }

        .dish-card {
            display: flex;
            gap: 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: all var(--transition);
            align-items: center;
        }
        .dish-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }
        .dish-card:active { transform: scale(0.98); }

        .dish-img {
            width: 68px;
            height: 68px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background: var(--bg-input);
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .dish-info {
            flex: 1;
            min-width: 0;
        }
        .dish-info h4 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 2px;
            line-height: 1.3;
        }
        .dish-info .desc {
            font-size: 12px;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }
        .dish-info .price {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--primary);
            font-size: 15px;
            margin-top: 4px;
        }
        .dish-info .allergenes {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ============================================================
           QUANTITY CONTROLS - Premium
           ============================================================ */
        .qty-control {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-input);
            border-radius: 20px;
            padding: 2px 4px;
            border: 1px solid var(--border);
            transition: all var(--transition);
        }
        .qty-control:hover { border-color: var(--primary); }
        .qty-control button {
            background: transparent;
            border: none;
            color: var(--text);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .qty-control button:hover {
            background: var(--border);
            color: var(--primary);
        }
        .qty-control .qty-num {
            font-weight: 700;
            min-width: 22px;
            text-align: center;
            font-size: 15px;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn-add {
            background: var(--primary);
            color: var(--text-inverse);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(232,163,61,0.25);
        }
        .btn-add:hover {
            transform: scale(1.06);
            box-shadow: 0 4px 16px rgba(232,163,61,0.35);
        }
        .btn-add:active { transform: scale(0.92); }

        /* ============================================================
           CART SHEET - Premium Slide
           ============================================================ */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            display: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease;
        }
        .overlay.open { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .cart-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            z-index: 201;
            padding: 20px 24px 30px;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 85vh;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
        }
        .cart-sheet.open { transform: translateY(0); }

        .cart-sheet .handle {
            width: 44px;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            margin: 0 auto 16px;
        }
        .cart-sheet h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            align-items: center;
        }
        .cart-item:last-child { border-bottom: none; }
        .cart-item .item-name { font-weight: 500; }
        .cart-item .item-price { font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .cart-total {
            display: flex;
            justify-content: space-between;
            padding: 16px 0 20px;
            font-size: 20px;
            font-weight: 800;
            border-top: 2px solid var(--border);
            margin-top: 4px;
        }
        .cart-total .total-amount { color: var(--primary); }

        .btn-send {
            width: 100%;
            background: var(--primary);
            color: var(--text-inverse);
            border: none;
            padding: 16px;
            border-radius: var(--radius-sm);
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .btn-send:hover {
            transform: scale(1.01);
            box-shadow: 0 4px 20px rgba(232,163,61,0.3);
        }
        .btn-send:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ============================================================
           TOAST - Premium
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-card);
            color: var(--text);
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            z-index: 300;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
        .toast .toast-icon { margin-right: 8px; }

        /* ============================================================
           EMPTY STATE
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 56px; margin-bottom: 12px; }
        .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 4px; }
        .empty-state p { font-size: 14px; }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 480px) {
            .hero {
                padding: 20px 16px 16px;
                margin: 8px 12px 0;
            }
            .hero h1 { font-size: 18px; }
            .hero .subtitle { font-size: 12px; }
            .hero .table-tag { font-size: 10px; padding: 4px 12px; }

            .dish-img { width: 54px; height: 54px; }
            .dish-info h4 { font-size: 13px; }
            .dish-info .desc { font-size: 11px; }
            .dish-info .price { font-size: 13px; }

            .topbar-brand { font-size: 16px; }
            .btn-icon { padding: 5px 10px; font-size: 11px; }
            .btn-icon .lang-text { display: none; }
            .btn-cart { padding: 6px 12px; font-size: 12px; }

            .cart-sheet { padding: 16px 16px 24px; }
            .cart-sheet h3 { font-size: 17px; }
            .cart-total { font-size: 17px; }
            .btn-send { font-size: 15px; padding: 14px; }

            .section-title { font-size: 18px; }
            .cat-chip { font-size: 11px; padding: 5px 14px; }
        }

        @media (max-width: 380px) {
            .hero h1 { font-size: 16px; }
            .dish-card { padding: 10px 12px; gap: 10px; }
            .dish-img { width: 46px; height: 46px; }
            .topbar-actions { gap: 4px; }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    TOP BAR
    ============================================================ -->
    <header class="topbar" id="topbar">
        <div class="topbar-brand">
            Smart<span class="highlight">QR</span>
            <span class="light">• Menu</span>
        </div>
        <div class="topbar-actions">
            <button class="btn-icon active" data-lang="fr" onclick="setLang('fr')">
                <span class="lang-text">FR</span>
            </button>
            <button class="btn-icon" data-lang="ar" onclick="setLang('ar')">
                <span class="lang-text">ع</span>
            </button>
            <button class="btn-icon" onclick="toggleTheme()" id="themeBtn" title="Changer de thème">
                🌙
            </button>
            <button class="btn-cart" onclick="openCart()">
                🛒 <span class="badge" id="cartBadge">0</span>
            </button>
        </div>
    </header>

    <!-- ============================================================
    HERO
    ============================================================ -->
    <section class="hero">
        <div class="hero-content">
            <div>
                <h1 id="welcomeMsg">Bienvenue</h1>
                <div class="subtitle" id="restoName">SmartQR Restaurant</div>
            </div>
            <span class="table-tag" id="tableTag">📍 T1</span>
        </div>
    </section>

    <!-- ============================================================
    CATEGORIES
    ============================================================ -->
    <div class="categories" id="categoriesBar"></div>

    <!-- ============================================================
    MENU
    ============================================================ -->
    <main class="menu-container" id="menuContainer">
        <div class="empty-state">
            <div class="icon">⏳</div>
            <h3>Chargement...</h3>
            <p>Veuillez patienter</p>
        </div>
    </main>

    <!-- ============================================================
    CART
    ============================================================ -->
    <div class="overlay" id="overlay" onclick="closeCart()"></div>
    <div class="cart-sheet" id="cartSheet">
        <div class="handle"></div>
        <h3>🛒 <span id="cartTitle">Votre Panier</span></h3>
        <div id="cartItems"></div>
        <div class="cart-total">
            <span id="totalLabel">Total</span>
            <span class="total-amount" id="cartTotal">0 DA</span>
        </div>
        <button class="btn-send" id="sendBtn" onclick="sendOrder()">
            🚀 <span id="sendLabel">Commander</span>
        </button>
    </div>

    <!-- ============================================================
    TOAST
    ============================================================ -->
    <div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script>
        // ============================================================
        // SMARTQR CLIENT - VERSION CERTIFIÉE PRO
        // ============================================================

        // ---- STATE ----
        let menu = [];
        let cart = [];
        let lang = 'fr';
        let config = {};
        const magasinId = getMagasinId();
        const tableId = getTableId();
        SmartQRApi.magasinId = magasinId;

        // ---- DICTIONARY ----
        const DICT = {
            fr: {
                welcome: 'Bienvenue',
                resto: 'SmartQR Restaurant',
                cart: 'Votre Panier',
                total: 'Total',
                send: 'Commander',
                empty: 'Votre panier est vide',
                added: 'Ajouté au panier',
                sent: 'Commande envoyée avec succès !',
                noMenu: 'Aucun plat disponible',
                loading: 'Chargement du menu...',
                choose: 'Choisissez vos plats'
            },
            ar: {
                welcome: 'مرحباً',
                resto: 'مطعم سمارت كيو آر',
                cart: 'سلتك',
                total: 'المجموع',
                send: 'أرسل الطلب',
                empty: 'سلتك فارغة',
                added: 'أضيف إلى السلة',
                sent: 'تم إرسال طلبك بنجاح!',
                noMenu: 'لا توجد أطباق متاحة',
                loading: 'جاري تحميل القائمة...',
                choose: 'اختر أطباقك'
            }
        };

        // ---- DOM REFS ----
        const $ = id => document.getElementById(id);
        const welcomeMsg = $('welcomeMsg');
        const restoName = $('restoName');
        const tableTag = $('tableTag');
        const categoriesBar = $('categoriesBar');
        const menuContainer = $('menuContainer');
        const cartBadge = $('cartBadge');
        const cartSheet = $('cartSheet');
        const overlay = $('overlay');
        const cartItems = $('cartItems');
        const cartTotal = $('cartTotal');
        const toast = $('toast');

        tableTag.textContent = '📍 ' + tableId;

        // ---- THEME ----
        function toggleTheme() {
            const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('smartqr_theme', theme);
            $('themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        // Init theme
        const savedTheme = localStorage.getItem('smartqr_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        $('themeBtn').textContent = savedTheme === 'dark' ? '🌙' : '☀️';

        // ---- LANG ----
        function setLang(l) {
            lang = l;
            document.querySelectorAll('[data-lang]').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === l);
            });
            document.body.classList.toggle('rtl', l === 'ar');
            renderUI();
        }

        function t(key) {
            return DICT[lang]?.[key] || DICT.fr[key] || key;
        }

        function parseLoc(str) {
            if (!str) return '';
            const parts = str.split('|').map(s => s.trim());
            if (parts.length === 3) {
                return lang === 'fr' ? parts[0] : (lang === 'ar' ? parts[2] : parts[0]);
            }
            return parts[0] || str;
        }

        // ---- INIT ----
        async function init() {
            try {
                config = await SmartQRApi.get('getConfig');
                const welcome = config['WelcomeMsg_' + lang] || config.NomRestaurant || 'SmartQR';
                welcomeMsg.textContent = parseLoc(welcome);
                restoName.textContent = parseLoc(config.NomRestaurant || 'SmartQR Restaurant');

                menu = await SmartQRApi.get('getMenu');

                if (!menu || menu.length === 0) {
                    menuContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <h3>${t('noMenu')}</h3>
                            <p>${t('choose')}</p>
                        </div>
                    `;
                    return;
                }
                renderUI();
            } catch (err) {
                console.error('Init error:', err);
                menuContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h3>Erreur de chargement</h3>
                        <p>${err.message}</p>
                        <button onclick="init()" style="margin-top:14px;padding:10px 28px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);cursor:pointer;font-weight:600;color:var(--text);">🔄 Réessayer</button>
                    </div>
                `;
            }
        }

        // ---- RENDER UI ----
        function renderUI() {
            // Categories
            categoriesBar.innerHTML = menu.map((c, i) => `
                <div class="cat-chip ${i === 0 ? 'active' : ''}" 
                     onclick="document.getElementById('cat-${c.id}')?.scrollIntoView({behavior:'smooth', block:'start'})">
                    ${parseLoc(c.nom)}
                </div>
            `).join('');

            // Menu
            menuContainer.innerHTML = menu.map(c => `
                <div id="cat-${c.id}">
                    <div class="section-title">
                        ${parseLoc(c.nom)}
                        <span class="count">(${c.produits.length})</span>
                    </div>
                </div>
                ${c.produits.map(p => `
                    <div class="dish-card">
                        <img class="dish-img" src="${p.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=150'}" 
                             loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=150'"
                             alt="${parseLoc(p.nom)}">
                        <div class="dish-info">
                            <h4>${parseLoc(p.nom)}</h4>
                            <div class="desc">${parseLoc(p.description)}</div>
                            <div class="price">${p.prix} DA</div>
                            ${p.allergenes ? `<div class="allergenes">⚠️ ${parseLoc(p.allergenes)}</div>` : ''}
                        </div>
                        <div id="qty-${p.id}">${renderQty(p)}</div>
                    </div>
                `).join('')}
            `).join('');

            // Cart UI
            updateCartUI();
        }

        function renderQty(p) {
            const item = cart.find(c => c.id === p.id);
            if (!item) {
                return `<button class="btn-add" onclick="addItem('${p.id}')">+</button>`;
            }
            return `
                <div class="qty-control">
                    <button onclick="updateQty('${p.id}', -1)">−</button>
                    <span class="qty-num">${item.qte}</span>
                    <button onclick="updateQty('${p.id}', 1)">+</button>
                </div>
            `;
        }

        function findProduct(id) {
            for (const c of menu) {
                const p = c.produits.find(x => x.id === id);
                if (p) return p;
            }
            return null;
        }

        // ---- CART ----
        function addItem(id) {
            const p = findProduct(id);
            if (!p) return;
            const existing = cart.find(c => c.id === id);
            if (existing) existing.qte += 1;
            else cart.push({ id: p.id, nom: p.nom, prix: p.prix, qte: 1 });
            updateCartUI();
            showToast('✅ ' + t('added'), 'success');
        }

        function updateQty(id, delta) {
            const item = cart.find(c => c.id === id);
            if (!item) return;
            item.qte += delta;
            if (item.qte <= 0) cart = cart.filter(c => c.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const total = cart.reduce((s, i) => s + i.qte, 0);
            cartBadge.textContent = total;

            // Update dish cards
            menu.forEach(c => c.produits.forEach(p => {
                const el = document.getElementById('qty-' + p.id);
                if (el) el.innerHTML = renderQty(p);
            }));

            // Update cart sheet if open
            if (cartSheet.classList.contains('open')) renderCartSheet();
        }

        function renderCartSheet() {
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div style="text-align:center;padding:30px 20px;color:var(--text-secondary);">
                        <div style="font-size:36px;">🛒</div>
                        <p style="margin-top:8px;">${t('empty')}</p>
                    </div>
                `;
                cartTotal.textContent = '0 DA';
                $('sendBtn').disabled = true;
                return;
            }
            cartItems.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <span class="item-name">${i.qte}× ${parseLoc(i.nom)}</span>
                    <span class="item-price">${i.qte * i.prix} DA</span>
                </div>
            `).join('');
            cartTotal.textContent = cart.reduce((s, i) => s + i.qte * i.prix, 0) + ' DA';
            $('sendBtn').disabled = false;
        }

        function openCart() {
            if (cart.length === 0) {
                showToast('🛒 ' + t('empty'), 'error');
                return;
            }
            renderCartSheet();
            overlay.classList.add('open');
            cartSheet.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeCart() {
            overlay.classList.remove('open');
            cartSheet.classList.remove('open');
            document.body.style.overflow = '';
        }

        // ---- SEND ORDER ----
        async function sendOrder() {
            if (cart.length === 0) return;
            const btn = $('sendBtn');
            btn.disabled = true;
            btn.textContent = '⏳...';

            try {
                const res = await SmartQRApi.post('createOrder', {
                    tableId: tableId,
                    items: cart.map(i => ({
                        id: i.id,
                        nom: i.nom,
                        prix: i.prix,
                        qte: i.qte
                    })),
                    notes: 'Langue: ' + lang
                });

                if (res.ok) {
                    showToast('✅ ' + t('sent'), 'success');
                    cart = [];
                    updateCartUI();
                    closeCart();
                } else {
                    showToast('❌ ' + (res.error || 'Erreur'), 'error');
                }
            } catch (err) {
                showToast('❌ ' + err.message, 'error');
            }

            btn.disabled = false;
            btn.textContent = t('send');
        }

        // ---- TOAST ----
        function showToast(msg, type = '') {
            toast.textContent = msg;
            toast.className = 'toast' + (type ? ' ' + type : '');
            requestAnimationFrame(() => toast.classList.add('show'));
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // ---- START ----
        init();

        // Close cart with Escape
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeCart();
        });

        // Close cart on click outside (overlay)
        overlay.addEventListener('click', closeCart);
    </script>
</body>
</html>
