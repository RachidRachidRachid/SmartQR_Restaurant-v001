<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartQR • Serveur</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E8A33D;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
            --bg: #0A0A0F;
            --bg-card: #14141C;
            --text: #F0F0F5;
            --text-secondary: #8A8AA0;
            --border: #2A2A3A;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 40px rgba(0,0,0,0.3);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="light"] {
            --bg: #F5F3F0;
            --bg-card: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #6B6459;
            --border: #E5E0D8;
            --shadow: 0 8px 40px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px 20px 30px;
            transition: background 0.4s ease;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--border);
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
        }
        .header h1 span { color: var(--primary); }

        .btn {
            padding: 6px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn:hover { border-color: var(--primary); }
        .btn-primary { background: var(--primary); color: var(--text-inverse); border-color: var(--primary); }

        .grid-2 {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
        }
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
        }
        .panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticket-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .ticket-item:hover { border-color: var(--primary); }
        .ticket-item.active {
            border-color: var(--primary);
            background: rgba(232,163,61,0.06);
        }
        .ticket-item .table {
            font-weight: 700;
            font-size: 14px;
        }
        .ticket-item .time {
            font-size: 11px;
            color: var(--text-secondary);
        }
        .status-tag {
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-tag.new { background: var(--info); color: #fff; }
        .status-tag.prep { background: var(--warning); color: #fff; }
        .status-tag.ready { background: var(--success); color: #fff; }
        .status-tag.delivered { background: var(--primary); color: var(--text-inverse); }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 8px; }

        .btn-deliver {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--primary);
            color: var(--text-inverse);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .btn-deliver:hover { transform: scale(1.01); }
        .btn-deliver:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            font-weight: 600;
            z-index: 999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .header h1 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>👨‍💼 Serveur • <span>Livraison</span></h1>
        <div>
            <button class="btn btn-primary" onclick="loadOrders()">🔄 Rafraîchir</button>
            <button class="btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>
    </header>

    <div class="grid-2">
        <div class="panel">
            <div class="panel-title">
                <span>📋 Commandes à livrer</span>
                <span id="ticketCount" style="font-size:13px;font-weight:400;color:var(--text-secondary);">0</span>
            </div>
            <div id="ticketList" style="max-height:65vh;overflow-y:auto;">
                <div class="empty-state"><div class="icon">✅</div><p>Toutes les commandes sont livrées</p></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">📍 Détails de la commande</div>
            <div id="detailArea">
                <div class="empty-state"><div class="icon">👆</div><p>Sélectionnez une commande</p></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script>
        // ============================================================
        // SMARTQR SERVEUR - VERSION CERTIFIÉE PRO
        // ============================================================

        let currentTheme = localStorage.getItem('smartqr_theme') || 'dark';
        let orders = [];
        let selectedOrder = null;

        applyTheme(currentTheme);
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('smartqr_theme', currentTheme);
            applyTheme(currentTheme);
        }
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        async function loadOrders() {
            try {
                const allOrders = await SmartQRApi.get('getOrders');
                orders = allOrders.filter(o => o.statut !== 'servie' && o.statut !== 'annulee');
                orders.sort((a, b) => new Date(b.dateHeure) - new Date(a.dateHeure));

                document.getElementById('ticketCount').textContent = orders.length;
                renderTickets();

                if (selectedOrder) {
                    const fresh = orders.find(o => o.id === selectedOrder.id);
                    if (fresh) { selectedOrder = fresh; renderDetail(fresh); }
                    else { selectedOrder = null; resetDetail(); }
                }
            } catch (err) {
                showToast('❌ ' + err.message, 'error');
            }
        }

        function renderTickets() {
            const container = document.getElementById('ticketList');
            if (orders.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>Toutes les commandes sont livrées</p></div>`;
                return;
            }

            const statusMap = { 'nouvelle': 'new', 'en_preparation': 'prep', 'prete': 'ready' };
            const statusLabel = { 'nouvelle': 'Reçu', 'en_preparation': 'Cuisine', 'prete': 'Prêt' };

            container.innerHTML = orders.map(o => {
                const isActive = selectedOrder?.id === o.id;
                return `
                    <div class="ticket-item ${isActive ? 'active' : ''}" onclick="selectOrder('${o.id}')">
                        <div>
                            <div class="table">📍 ${o.tableId}</div>
                            <div class="time">${new Date(o.dateHeure).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-weight:700;">${(Number(o.total) || 0).toLocaleString()} DA</div>
                            <span class="status-tag ${statusMap[o.statut] || 'new'}">${statusLabel[o.statut] || o.statut}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectOrder(id) {
            selectedOrder = orders.find(o => o.id === id);
            if (selectedOrder) {
                renderTickets();
                renderDetail(selectedOrder);
            }
        }

        function renderDetail(order) {
            const area = document.getElementById('detailArea');
            const statusMap = { 'nouvelle': 'Reçu en cuisine', 'en_preparation': 'En préparation', 'prete': 'Prêt à servir' };

            area.innerHTML = `
                <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);">
                    <div style="display:flex;justify-content:space-between;font-size:13px;">
                        <span><strong>Table:</strong> ${order.tableId}</span>
                        <span><strong>N°</strong> ${order.id.slice(0,12)}</span>
                    </div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">
                        ${new Date(order.dateHeure).toLocaleString('fr-FR')}
                    </div>
                </div>
                <div style="margin-bottom:14px;">
                    ${order.items.map(i => `
                        <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--border);font-size:14px;">
                            <span>${i.qte}× ${i.nom ? i.nom.split('|')[0].trim() : i.nom}</span>
                            <span style="font-weight:600;">${(i.qte * i.prixUnitaire).toLocaleString()} DA</span>
                        </div>
                    `).join('')}
                </div>
                <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;padding:12px 0;border-top:2px solid var(--border);margin-bottom:14px;">
                    <span>TOTAL</span>
                    <span style="color:var(--primary);">${(Number(order.total) || 0).toLocaleString()} DA</span>
                </div>
                <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">
                    Statut: <strong style="color:var(--text);">${statusMap[order.statut] || order.statut}</strong>
                </div>
                ${order.statut === 'prete' ? `
                    <button class="btn-deliver" onclick="deliverOrder('${order.id}', this)">🚚 Livrer la commande</button>
                ` : `
                    <button class="btn-deliver" disabled style="background:var(--text-muted);">⏳ En attente de préparation</button>
                `}
            `;
        }

        function resetDetail() {
            document.getElementById('detailArea').innerHTML = `
                <div class="empty-state"><div class="icon">👆</div><p>Sélectionnez une commande</p></div>
            `;
        }

        async function deliverOrder(orderId, btn) {
            if (!confirm('Confirmer la livraison de cette commande ?')) return;
            btn.disabled = true;
            btn.textContent = '⏳...';

            try {
                const res = await SmartQRApi.post('updateOrderStatus', {
                    commandeId: orderId,
                    statut: 'servie'
                });
                if (res.ok) {
                    showToast('✅ Commande livrée avec succès !', 'success');
                    selectedOrder = null;
                    loadOrders();
                    resetDetail();
                } else {
                    showToast('❌ ' + (res.error || 'Erreur'), 'error');
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('❌ ' + err.message, 'error');
                btn.disabled = false;
            }
        }

        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (type ? ' ' + type : '');
            setTimeout(() => t.classList.add('show'), 10);
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 3500);
        }

        loadOrders();
        setInterval(loadOrders, 10000);
    </script>
</body>
</html>
