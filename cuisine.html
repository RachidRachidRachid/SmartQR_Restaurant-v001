<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartQR • Cuisine KDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E8A33D;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
            
            --bg: #0A0A0F;
            --bg-card: #14141C;
            --bg-input: #1A1A24;
            --text: #F0F0F5;
            --text-secondary: #8A8AA0;
            --text-muted: #5A5A70;
            --border: #2A2A3A;
            --border-light: #3A3A4A;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 40px rgba(0,0,0,0.3);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="light"] {
            --bg: #F5F3F0;
            --bg-card: #FFFFFF;
            --bg-input: #F0EDEA;
            --text: #1A1A1A;
            --text-secondary: #6B6459;
            --text-muted: #A09888;
            --border: #E5E0D8;
            --border-light: #D5D0C8;
            --shadow: 0 8px 40px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px 20px 30px;
            transition: background 0.4s ease, color 0.4s ease;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--border);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 .badge {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
        }
        .status-badge {
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            background: var(--success);
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        .status-badge.offline { background: var(--danger); }
        .status-badge.warning { background: var(--warning); }

        .btn {
            padding: 6px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .btn:hover { border-color: var(--primary); }
        .btn-primary { background: var(--primary); color: var(--text-inverse); border-color: var(--primary); }

        /* KANBAN */
        .kanban {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .column {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            min-height: 60vh;
            transition: border var(--transition);
        }
        .column:hover { border-color: var(--border-light); }
        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .column-header .count {
            background: var(--bg-input);
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
        }

        /* ORDER CARD */
        .order-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 12px;
            transition: all var(--transition);
            animation: slideIn 0.3s ease;
            border-left: 3px solid transparent;
        }
        .order-card:hover { border-color: var(--primary); }
        .order-card.priority { border-left-color: var(--danger); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .order-meta {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        .order-table {
            background: rgba(232,163,61,0.12);
            padding: 2px 12px;
            border-radius: 4px;
            color: var(--primary);
            font-weight: 700;
        }
        .order-time {
            background: var(--bg-input);
            padding: 2px 10px;
            border-radius: 4px;
        }

        .order-items {
            list-style: none;
            margin-bottom: 12px;
        }
        .order-items li {
            padding: 4px 0;
            border-bottom: 1px dashed var(--border);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        .order-items .qty {
            font-weight: 700;
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
            margin-right: 6px;
        }

        .order-notes {
            font-size: 12px;
            color: var(--danger);
            background: rgba(231,76,60,0.06);
            padding: 6px 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 2px solid var(--danger);
        }

        .btn-action {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .btn-action.prep {
            background: var(--warning);
            color: var(--text-inverse);
        }
        .btn-action.ready {
            background: var(--success);
            color: #fff;
        }
        .btn-action:hover { transform: scale(1.01); }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 44px; margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            font-weight: 600;
            z-index: 999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        @media (max-width: 768px) {
            .kanban { grid-template-columns: 1fr; }
            .header h1 { font-size: 18px; }
            .header-left { flex-wrap: wrap; }
        }
        @media (max-width: 480px) {
            body { padding: 10px 12px 20px; }
            .column { padding: 12px; }
            .order-card { padding: 10px 12px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <h1>
                👨‍🍳 Cuisine
                <span class="badge" id="orderCount">0 en attente</span>
            </h1>
            <span class="status-badge" id="syncStatus">🟢 Connecté</span>
        </div>
        <div>
            <button class="btn btn-primary" onclick="loadOrders()">🔄 Rafraîchir</button>
            <button class="btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>
    </header>

    <div class="kanban">
        <div class="column">
            <div class="column-header">
                <span>📥 À Préparer</span>
                <span class="count" id="countNew">0</span>
            </div>
            <div id="listNew">
                <div class="empty-state"><div class="icon">✅</div><p>Tout est prêt</p></div>
            </div>
        </div>
        <div class="column">
            <div class="column-header">
                <span>🔥 En Cuisson</span>
                <span class="count" id="countPrep">0</span>
            </div>
            <div id="listPrep">
                <div class="empty-state"><div class="icon">⏳</div><p>Aucune commande en cours</p></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script>
        // ============================================================
        // SMARTQR CUISINE - VERSION CERTIFIÉE PRO
        // ============================================================

        let currentTheme = localStorage.getItem('smartqr_theme') || 'dark';
        let orders = [];
        let audioCtx = null;
        let previousNewCount = 0;

        // ---- THEME ----
        applyTheme(currentTheme);
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('smartqr_theme', currentTheme);
            applyTheme(currentTheme);
        }
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        // ---- LOAD ORDERS ----
        async function loadOrders() {
            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = '🔄 Synchronisation...';
            statusEl.className = 'status-badge warning';

            try {
                const allOrders = await SmartQRApi.get('getOrders');
                orders = allOrders;

                const newOrders = orders.filter(o => o.statut === 'nouvelle');
                const prepOrders = orders.filter(o => o.statut === 'en_preparation');

                // Notification sonore pour nouvelles commandes
                if (newOrders.length > previousNewCount) {
                    playNotification();
                    showToast('🔔 ' + (newOrders.length - previousNewCount) + ' nouvelle(s) commande(s)!', 'success');
                }
                previousNewCount = newOrders.length;

                document.getElementById('countNew').textContent = newOrders.length;
                document.getElementById('countPrep').textContent = prepOrders.length;
                document.getElementById('orderCount').textContent = (newOrders.length + prepOrders.length) + ' en attente';

                renderColumn('listNew', newOrders, 'prep', '⚡ Démarrer');
                renderColumn('listPrep', prepOrders, 'ready', '✅ Prêt');

                statusEl.textContent = '🟢 Connecté';
                statusEl.className = 'status-badge';

            } catch (err) {
                console.error('Load error:', err);
                statusEl.textContent = '🔴 Hors ligne';
                statusEl.className = 'status-badge offline';
                showToast('❌ ' + err.message, 'error');
            }
        }

        function renderColumn(containerId, orders, type, btnText) {
            const container = document.getElementById(containerId);
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">${type === 'prep' ? '✅' : '⏳'}</div>
                        <p>${type === 'prep' ? 'Aucune commande à préparer' : 'Aucune commande en cours'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(o => `
                <div class="order-card ${o.notes ? 'priority' : ''}">
                    <div class="order-meta">
                        <span class="order-table">📍 ${o.tableId}</span>
                        <span class="order-time">${new Date(o.dateHeure).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <ul class="order-items">
                        ${o.items.map(i => `
                            <li>
                                <span><span class="qty">${i.qte}×</span> ${i.nom ? i.nom.split('|')[0].trim() : i.nom}</span>
                            </li>
                        `).join('')}
                    </ul>
                    ${o.notes ? `<div class="order-notes">💡 ${o.notes}</div>` : ''}
                    <button class="btn-action ${type}" onclick="updateStatus('${o.id}', '${type === 'prep' ? 'en_preparation' : 'prete'}', this)">
                        ${btnText}
                    </button>
                </div>
            `).join('');
        }

        // ---- UPDATE STATUS ----
        async function updateStatus(orderId, nextStatus, btn) {
            btn.disabled = true;
            btn.textContent = '⏳...';

            try {
                const res = await SmartQRApi.post('updateOrderStatus', {
                    commandeId: orderId,
                    statut: nextStatus
                });
                if (res.ok) {
                    showToast('✅ Statut mis à jour', 'success');
                    loadOrders();
                } else {
                    showToast('❌ ' + (res.error || 'Erreur'), 'error');
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('❌ ' + err.message, 'error');
                btn.disabled = false;
            }
        }

        // ---- NOTIFICATION SONORE ----
        function playNotification() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.value = 0.12;
                osc.start();
                setTimeout(() => { osc.frequency.value = 1100; }, 100);
                setTimeout(() => { osc.frequency.value = 1320; }, 200);
                setTimeout(() => { osc.stop(); }, 350);
            } catch (e) { /* Fallback silencieux */ }
        }

        // ---- TOAST ----
        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (type ? ' ' + type : '');
            setTimeout(() => t.classList.add('show'), 10);
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 3500);
        }

        // ---- AUTO REFRESH ----
        loadOrders();
        setInterval(loadOrders, 8000);
    </script>
</body>
</html>
