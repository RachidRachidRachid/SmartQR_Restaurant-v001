<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartQR • Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E8A33D;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
            --bg: #0A0A0F;
            --bg-card: #14141C;
            --text: #F0F0F5;
            --text-secondary: #8A8AA0;
            --text-muted: #5A5A70;
            --border: #2A2A3A;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 40px rgba(0,0,0,0.3);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="light"] {
            --bg: #F5F3F0;
            --bg-card: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #6B6459;
            --text-muted: #A09888;
            --border: #E5E0D8;
            --shadow: 0 8px 40px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px 20px 30px;
            transition: background 0.4s ease;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--border);
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
        }
        .header h1 span { color: var(--primary); }

        .btn {
            padding: 6px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn:hover { border-color: var(--primary); }
        .btn-primary { background: var(--primary); color: var(--text-inverse); border-color: var(--primary); }

        .kpis {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .kpi {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            transition: all var(--transition);
        }
        .kpi:hover { border-color: var(--primary); }
        .kpi .label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .kpi .value {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-top: 4px;
        }
        .kpi .change {
            font-size: 12px;
            color: var(--success);
            margin-top: 2px;
        }
        .kpi .change.down { color: var(--danger); }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
        }
        .panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .stat-item:last-child { border-bottom: none; }
        .stat-item .label { color: var(--text-secondary); }
        .stat-item .value { font-weight: 700; }

        .status-tag {
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
        }
        .status-tag.new { background: var(--info); color: #fff; }
        .status-tag.prep { background: var(--warning); color: #fff; }
        .status-tag.ready { background: var(--success); color: #fff; }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 32px; }

        @media (max-width: 768px) {
            .kpis { grid-template-columns: 1fr 1fr; }
            .grid-2 { grid-template-columns: 1fr; }
            .header h1 { font-size: 18px; }
        }
        @media (max-width: 480px) {
            .kpis { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>📊 Administration <span>SmartQR</span></h1>
        <div>
            <span id="syncStatus" style="font-size:12px;color:var(--text-secondary);margin-right:12px;">🟢 Connecté</span>
            <button class="btn btn-primary" onclick="loadDashboard()">🔄 Rafraîchir</button>
            <button class="btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>
    </header>

    <div class="kpis" id="kpis">
        <div class="kpi">
            <div class="label">Chiffre d'Affaires</div>
            <div class="value" id="kpiCa">—</div>
        </div>
        <div class="kpi">
            <div class="label">Commandes du jour</div>
            <div class="value" id="kpiOrders">—</div>
        </div>
        <div class="kpi">
            <div class="label">Panier Moyen</div>
            <div class="value" id="kpiAvg">—</div>
        </div>
        <div class="kpi">
            <div class="label">Total Commandes</div>
            <div class="value" id="kpiTotal">—</div>
        </div>
    </div>

    <div class="grid-2">
        <div class="panel">
            <div class="panel-title">
                <span>📋 Commandes récentes</span>
            </div>
            <div id="recentOrders">
                <div class="empty-state"><div class="icon">⏳</div><p>Chargement...</p></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">
                <span>📊 Statistiques par statut</span>
            </div>
            <div id="statusStats">
                <div class="empty-state"><div class="icon">⏳</div><p>Chargement...</p></div>
            </div>
        </div>
    </div>

    <div style="margin-top:20px;text-align:center;font-size:12px;color:var(--text-muted);">
        SmartQR Restaurant Suite V5 • © 2025
    </div>

    <script src="config.js"></script>
    <script>
        // ============================================================
        // SMARTQR ADMIN - VERSION CERTIFIÉE PRO
        // ============================================================

        let currentTheme = localStorage.getItem('smartqr_theme') || 'dark';

        applyTheme(currentTheme);
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('smartqr_theme', currentTheme);
            applyTheme(currentTheme);
        }
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        async function loadDashboard() {
            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = '🔄 Synchronisation...';

            try {
                // Dashboard stats
                const stats = await SmartQRApi.get('getDashboard');
                document.getElementById('kpiCa').textContent = (stats.ca || 0).toLocaleString() + ' DA';
                document.getElementById('kpiOrders').textContent = stats.nbCommandes || 0;
                document.getElementById('kpiAvg').textContent = (stats.panierMoyen || 0).toLocaleString() + ' DA';
                document.getElementById('kpiTotal').textContent = stats.totalCommandes || 0;

                // Recent orders
                const orders = await SmartQRApi.get('getOrders');
                const recent = orders.slice(0, 10);
                const container = document.getElementById('recentOrders');

                if (recent.length === 0) {
                    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Aucune commande</p></div>`;
                } else {
                    const statusMap = { 'nouvelle': 'new', 'en_preparation': 'prep', 'prete': 'ready', 'servie': 'ready' };
                    const statusLabel = { 'nouvelle': 'Reçu', 'en_preparation': 'Cuisine', 'prete': 'Prêt', 'servie': 'Servi' };
                    container.innerHTML = recent.map(o => `
                        <div class="stat-item">
                            <span><strong>📍 ${o.tableId}</strong> <span style="color:var(--text-secondary);font-size:12px;">${new Date(o.dateHeure).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}</span></span>
                            <span>
                                <span style="font-weight:700;margin-right:10px;">${(Number(o.total) || 0).toLocaleString()} DA</span>
                                <span class="status-tag ${statusMap[o.statut] || 'new'}">${statusLabel[o.statut] || o.statut}</span>
                            </span>
                        </div>
                    `).join('');
                }

                // Status stats
                const statusStats = document.getElementById('statusStats');
                if (stats.parStatut) {
                    const labels = { 'nouvelle': '📥 Nouvelles', 'en_preparation': '🔥 En cours', 'prete': '✅ Prêtes', 'servie': '📤 Servies', 'annulee': '🚫 Annulées' };
                    const colors = { 'nouvelle': 'var(--info)', 'en_preparation': 'var(--warning)', 'prete': 'var(--success)', 'servie': 'var(--primary)', 'annulee': 'var(--danger)' };
                    statusStats.innerHTML = Object.entries(stats.parStatut).map(([key, val]) => `
                        <div class="stat-item">
                            <span style="color:${colors[key] || 'var(--text)'}">${labels[key] || key}</span>
                            <span class="value">${val}</span>
                        </div>
                    `).join('');
                }

                statusEl.textContent = '🟢 Connecté';
            } catch (err) {
                console.error('Dashboard error:', err);
                statusEl.textContent = '🔴 Hors ligne';
                showToast('❌ ' + err.message, 'error');
            }
        }

        function showToast(msg, type = '') {
            const t = document.createElement('div');
            t.style.cssText = `
                position:fixed; bottom:20px; right:20px; padding:12px 24px;
                border-radius:10px; background:var(--bg-card); color:var(--text);
                border:1px solid var(--border); font-weight:600; z-index:999;
                opacity:0; transform:translateY(20px); transition:all 0.3s ease;
                box-shadow:var(--shadow);
            `;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.style.opacity = '1', 10);
            if (type === 'error') t.style.borderColor = 'var(--danger)';
            setTimeout(() => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 400);
            }, 3500);
        }

        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
